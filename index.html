<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIMZX OFFICIAL</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('bg.jpg'); /* GANTI SESUAI NAMA FILE */
      background-size: cover;
      background-position: center;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      align-items: center;
    }

    header h1 {
      color: #ff2e2e;
      text-shadow: 0 0 10px red;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: white;
    }

    nav button {
      margin-left: 20px;
      padding: 8px 15px;
      border-radius: 20px;
      border: none;
      background: red;
      color: white;
      cursor: pointer;
    }

    .hero {
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h2 {
      font-size: 45px;
      text-shadow: 0 0 20px red;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: red;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      color: white;
      box-shadow: 0 0 20px red;
    }

    /* LOGIN */
    .login-box {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.95);
      padding: 30px;
      border-radius: 15px;
      display: none;
      width: 300px;
      box-shadow: 0 0 25px red;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background: red;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      color: white;
    }

    .close {
      float: right;
      cursor: pointer;
      color: red;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.6);
    }
  </style>
</head>

<body>

<header>
  <h1>CIMZX OFFICIAL</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Anime</a>
    <a href="#">About</a>
    <button onclick="openLogin()">Login</button>
  </nav>
</header>

<section class="hero">
  <div>
    <h2>WELCOME TO CIMZX 🔥</h2>
    <p>Website marketing + anime aesthetic</p>
    <button class="btn" onclick="openLogin()">Masuk Sekarang</button>
  </div>
</section>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <span class="close" onclick="closeLogin()">X</span>
  <h3>Login</h3>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Masuk</button>
</div>

<footer>
  © 2026 CIMZX OFFICIAL
</footer>

<script>
function openLogin() {
  document.getElementById("loginBox").style.display = "block";
}

function closeLogin() {
  document.getElementById("loginBox").style.display = "none";
}

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "admin" && pass === "12345") {
    alert("Login Berhasil 🔥");
    closeLogin();
  } else {
    alert("Salah ❌");
  }
}
</script>

</body>
</html>
