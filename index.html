<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexsa AnimeFlix</title>
<style>
body {margin:0;font-family:Arial;background:#141414;color:white}
header {display:flex;justify-content:space-between;padding:20px;background:#000}
header h1 {color:red}
nav a {color:white;margin-left:15px;text-decoration:none}.banner { height:300px; background: url('ASH_IMAGE.jpg') center/cover no-repeat; display:flex; align-items:flex-end; padding:20px; }

.section {padding:20px} .row {display:flex;overflow-x:auto} .card {min-width:200px;margin-right:10px;background:#222;border-radius:10px;padding:10px} .card img {width:100%;border-radius:10px} .card h3 {font-size:14px}

.player { position:fixed; top:0;left:0;width:100%;height:100%; background:black; display:none; justify-content:center; align-items:center; flex-direction:column; }

video {width:80%} button {margin-top:10px;padding:10px 20px;border:none;background:red;color:white;cursor:pointer} </style>

</head>
<body><header>
<h1>AnimeFlix</h1>
<nav>
<a href="#">Home</a>
<a href="#">Anime</a>
<a href="#">Trending</a>
</nav>
</header><div class="banner">
<h2>Streaming Anime Favoritmu</h2>
</div><div class="section">
<h2>Populer</h2>
<div class="row"><div class="card" onclick="playVideo('video/naruto.mp4')">
<img src="https://upload.wikimedia.org/wikipedia/en/9/94/NarutoCoverTankobon1.jpg">
<h3>Naruto</h3>
</div><div class="card" onclick="playVideo('video/onepiece.mp4')">
<img src="https://upload.wikimedia.org/wikipedia/en/2/2c/OnePiece64Cover.png">
<h3>One Piece</h3>
</div><div class="card" onclick="playVideo('video/aot.mp4')">
<img src="https://upload.wikimedia.org/wikipedia/en/7/7a/Attack_on_Titan_volume_1_cover.jpg">
<h3>Attack on Titan</h3>
</div><div class="card" onclick="playVideo('video/jujutsu.mp4')">
<img src="https://upload.wikimedia.org/wikipedia/en/4/46/Jujutsu_kaisen.jpg">
<h3>Jujutsu Kaisen</h3>
</div></div>
</div><div class="player" id="player">
<video id="videoPlayer" controls></video>
<button onclick="closePlayer()">Tutup</button>
</div><script>
function playVideo(src) {
  const player = document.getElementById('player');
  const video = document.getElementById('videoPlayer');
  video.src = src;
  player.style.display = 'flex';
}

function closePlayer() {
  const player = document.getElementById('player');
  const video = document.getElementById('videoPlayer');
  video.pause();
  player.style.display = 'none';
}
</script></body>
</html>
